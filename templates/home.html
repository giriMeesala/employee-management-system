
{% extends "base.html" %}
{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="display-4 fw-bold">
            Employee Management System
        </h1>

        <p class="lead text-secondary">
            Manage employees efficiently with a modern and secure platform.
        </p>

    </div>

    <div class="row">

        <div class="col-md-6">

            <div class="card shadow-lg border-0">

                <div class="card-body text-center">

                    <h3>👥 Employees</h3>

                    <p>
                        Add, update and manage employee records.
                    </p>

                    <button class="btn btn-primary">
                        Manage Employees
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow-lg border-0">

                <div class="card-body text-center">

                    <h3>📊 Dashboard</h3>

                    <p>
                        View reports and employee statistics.
                    </p>

                    <button class="btn btn-success">
                        Open Dashboard
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
