{% extends "base.html" %}

{% load static %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>📷 Login with Face</h3>

        </div>

        <div class="card-body text-center">

            <video
                id="video"
                width="700"
                height="500"
                autoplay
                playsinline
                class="border rounded">
            </video>

            <canvas
                id="canvas"
                style="display:none;">
            </canvas>

            <br><br>

            <button
                id="startCamera"
                class="btn btn-success">

                Start Camera

            </button>

            <button
                id="faceLogin"
                class="btn btn-primary">

                Login with Face

            </button>

            <br><br>

            <h5 id="status"></h5>

        </div>

    </div>

</div>

<script src="{% static 'js/face_login.js' %}"></script>

{% endblock %}
