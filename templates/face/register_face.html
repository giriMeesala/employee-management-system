{% extends "base.html" %}

{% load static %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>
                📷 Face Registration
            </h3>

        </div>

        <div class="card-body text-center">

            <video
                id="video"
                width="700"
                height="500"
                autoplay
                playsinline
                class="border rounded">
            </video>

            <h4 id="status" class="mt-3 text-success">
                Waiting for camera...
            </h4>

            <canvas
                id="canvas"
                style="display:none;">
            </canvas>

            <br><br>

            <button
                class="btn btn-success"
                id="startCamera">

                Start Camera

            </button>

            <button
                class="btn btn-primary"
                id="registerFace">

                Register Face

            </button>

        </div>

    </div>

    <script src="{% static 'js/face_register.js' %}"></script>

</div>

{% endblock %}
